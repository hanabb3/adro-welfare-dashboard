const fmtAxis = (n) => {

// ─── Supabase CRUD ────────────────────────────────────────────────────────────

const api = {
  async fetchAll() {
    const { data, error } = await db
      .from('welfare_records')
      .select('*')
      .order('date', { ascending: false });
    if (error) throw error;
    return data;
  },
  async insert(rec) {
    const { data, error } = await db
      .from('welfare_records')
      .insert(rec)
      .select()
      .single();
    if (error) throw error;
    return data;
  },
  async update(id, patch) {
    const { data, error } = await db
      .from('welfare_records')
      .update(patch)
      .eq('id', id)
      .select()
      .single();
    if (error) throw error;
    return data;
  },
  async remove(id) {
    const { error } = await db
      .from('welfare_records')
      .delete()
      .eq('id', id);
    if (error) throw error;
  },
};

};

const App = () => {
  const [records,        setRecords]        = React.useState([]);
  const [loading,        setLoading]        = React.useState(true);
  const [saving,         setSaving]         = React.useState(false);
  const [dbError,        setDbError]        = React.useState(null);
  const [activeTab,      setActiveTab]      = React.useState('overview');
  const [showAddModal,   setShowAddModal]   = React.useState(false);
  const [editRecord,     setEditRecord]     = React.useState(null);
  const [selectedPolicy, setSelectedPolicy] = React.useState(null);
  const [chartFilter,    setChartFilter]    = React.useState(Object.keys(POLICY_CONFIG));
  const [filterPolicy,   setFilterPolicy]   = React.useState('all');
  const [newRecord,      setNewRecord]      = React.useState(BLANK_RECORD);

  // ── 초기 로드 ──
  React.useEffect(() => {
    if (!IS_CONFIGURED) { setRecords(SAMPLE_RECORDS); setLoading(false); return; }
    api.fetchAll()
      .then(data => { setRecords(data); setLoading(false); })
      .catch(err  => { setDbError(err.message); setLoading(false); });
  }, []);

  // ── 파생 데이터 ──
  const policyStats = Object.values(POLICY_CONFIG).map(p => {
    const used     = records.filter(r => r.policy === p.id && r.approved).reduce((s, r) => s + r.amount, 0);
    const pending  = records.filter(r => r.policy === p.id && !r.approved).reduce((s, r) => s + r.amount, 0);
    return { ...p, used, pending, remaining: p.budget - used };
  });

  const totalUsed      = policyStats.reduce((s, p) => s + p.used, 0);
  const totalRemaining = TOTAL_BUDGET - totalUsed;

  const monthlyData = MONTH_NUMS.map(m => ({
    month: m, label: `${m}월`,
    total: records.filter(r => r.month === m && r.approved).reduce((s, r) => s + r.amount, 0),
    byPolicy: Object.keys(POLICY_CONFIG).reduce((acc, pid) => {
      acc[pid] = records.filter(r => r.policy === pid && r.month === m && r.approved).reduce((s, r) => s + r.amount, 0);
      return acc;
    }, {})
  }));

  const filteredRecords = filterPolicy === 'all'
    ? records
    : records.filter(r => r.policy === filterPolicy);

  // ── CRUD 핸들러 ──
  const handleAddRecord = async () => {
    if (!newRecord.name || !newRecord.amount || !newRecord.date) return;
    const payload = {
      policy: newRecord.policy,
      name: newRecord.name,
      amount: parseInt(String(newRecord.amount).replace(/,/g, ''), 10),
      month: parseInt(newRecord.month),
      date: newRecord.date,
      note: newRecord.note || '',
      approved: true,
    };
    if (!IS_CONFIGURED) {
      setRecords(prev => [...prev, { ...payload, id: Date.now() }]);
      setShowAddModal(false); setNewRecord(BLANK_RECORD); return;
    }
    setSaving(true);
    try {
      const created = await api.insert(payload);
      setRecords(prev => [...prev, created]);
      setShowAddModal(false); setNewRecord(BLANK_RECORD);
    } catch (err) { alert('저장 실패: ' + err.message); }
    finally { setSaving(false); }
  };

  const handleDelete = async (id) => {
    if (!IS_CONFIGURED) { setRecords(prev => prev.filter(r => r.id !== id)); return; }
    try {
      await api.remove(id);
      setRecords(prev => prev.filter(r => r.id !== id));
    } catch (err) { alert('삭제 실패: ' + err.message); }
  };

  const handleSaveEdit = async () => {
    if (!editRecord.name || !editRecord.amount || !editRecord.date) return;
    const patch = {
      policy: editRecord.policy,
      name: editRecord.name,
      amount: parseInt(String(editRecord.amount).replace(/,/g, ''), 10),
      month: parseInt(editRecord.month),
      date: editRecord.date,
      note: editRecord.note || '',
      approved: editRecord.approved,
    };
    if (!IS_CONFIGURED) {
      setRecords(prev => prev.map(r => r.id === editRecord.id ? { ...r, ...patch } : r));
      setEditRecord(null); return;
    }
    setSaving(true);
    try {
      const updated = await api.update(editRecord.id, patch);
      setRecords(prev => prev.map(r => r.id === editRecord.id ? updated : r));
      setEditRecord(null);
    } catch (err) { alert('수정 실패: ' + err.message); }
    finally { setSaving(false); }
  };

  // ── 로딩 화면 ──
  if (loading) return (
    <div style={{
      minHeight: '100vh', display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center', gap: 16, color: 'var(--text-tertiary)'
    }}>
      <Spinner size={32} />
      <span style={{ fontSize: 13 }}>데이터를 불러오는 중…</span>
    </div>
  );

  // ── DB 오류 화면 ──
  if (dbError) return (
    <div style={{
      minHeight: '100vh', display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center', gap: 16, padding: 40, textAlign: 'center'
    }}>
      <div style={{ fontSize: 32 }}>🔌</div>
      <div style={{ fontWeight: 600, fontSize: 16 }}>Supabase 연결 오류</div>
      <div style={{ fontSize: 13, color: 'var(--text-secondary)', maxWidth: 480, lineHeight: 1.7 }}>
        {dbError}<br/><br/>
        URL과 Anon Key가 올바른지, 테이블이 생성되어 있는지 확인하세요.
      </div>
    </div>
  );

  // ── 메인 UI ──
  const cur = new Date().getMonth() + 1;

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>

      {/* ── 헤더 ── */}
      <header style={{
        background: '#fff', borderBottom: '1px solid var(--border)',
        padding: '0 32px', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        height: 60, position: 'sticky', top: 0, zIndex: 100
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          <div style={{ display: 'flex', flexDirection: 'column' }}>
            <span style={{ fontWeight: 700, fontSize: 15, letterSpacing: '-0.02em' }}>adro</span>
            <span style={{ fontSize: 11, color: 'var(--text-tertiary)', marginTop: -2 }}>복지제도 예산 관리</span>
          </div>
          <div style={{ width: 1, height: 28, background: 'var(--border)', margin: '0 4px' }} />
          <nav style={{ display: 'flex', gap: 4 }}>
            {[
              { id: 'overview',    label: '개요' },
              { id: 'monthly',     label: '월별 현황' },
              { id: 'records',     label: '신청 내역' },
              { id: 'recipients',  label: '대상자 현황' },
            ].map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
                background: activeTab === t.id ? 'var(--bg)' : 'none',
                border: 'none', cursor: 'pointer', padding: '6px 14px', borderRadius: 8,
                fontSize: 13, fontWeight: activeTab === t.id ? 600 : 400,
                color: activeTab === t.id ? 'var(--text-primary)' : 'var(--text-secondary)',
                transition: 'all 0.15s'
              }}>{t.label}</button>
            ))}
          </nav>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>제도 시행 2026.04.01~</div>
          <button onClick={() => setShowAddModal(true)} style={{
            background: 'var(--text-primary)', color: '#fff', border: 'none', cursor: 'pointer',
            padding: '8px 16px', borderRadius: 8, fontSize: 13, fontWeight: 500,
            display: 'flex', alignItems: 'center', gap: 6
          }}>
            + 사용 내역 추가
          </button>
        </div>
      </header>

      {/* ── 본문 ── */}
      <main style={{ flex: 1, padding: '32px', maxWidth: 1200, margin: '0 auto', width: '100%' }}>

        {!IS_CONFIGURED && <SetupBanner />}

        {/* ════ 개요 탭 ════ */}
        {activeTab === 'overview' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>

            {/* KPI */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 16 }}>
              {[
                { label: '연간 총 예산',  value: fmt(TOTAL_BUDGET), sub: '현금성 복지',                            color: 'var(--text-primary)' },
                { label: '집행 완료',     value: fmt(totalUsed),    sub: `${((totalUsed/TOTAL_BUDGET)*100).toFixed(1)}% 소진`, color: 'var(--accent-blue)' },
              ].map((kpi, i) => (
                <div key={i} style={{
                  background: '#fff', border: '1px solid var(--border)', borderRadius: 14, padding: '20px 22px'
                }}>
                  <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginBottom: 8 }}>{kpi.label}</div>
                  <div style={{ fontSize: 22, fontWeight: 700, color: kpi.color, letterSpacing: '-0.03em' }}>{kpi.value}</div>
                  <div style={{ fontSize: 12, color: 'var(--text-tertiary)', marginTop: 4 }}>{kpi.sub}</div>
                </div>
              ))}
            </div>

            {/* 전체 예산 현황 */}
            <div style={{ background: '#fff', border: '1px solid var(--border)', borderRadius: 14, padding: '22px 24px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 14 }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>전체 예산 소진 현황</div>
                  <div style={{ fontSize: 12, color: 'var(--text-tertiary)', marginTop: 2 }}>2026.04.01 ~ 12.31</div>
                </div>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{fmt(totalUsed)} / {fmt(TOTAL_BUDGET)}</div>
              </div>
              <div style={{ height: 20, borderRadius: 10, background: '#e8e8e4', overflow: 'hidden', display: 'flex' }}>
                {policyStats.map(p => (
                  <div key={p.id} style={{
                    height: '100%', width: `${(p.used / TOTAL_BUDGET) * 100}%`,
                    background: p.color, transition: 'width 0.6s ease'
                  }} title={`${p.name}: ${fmt(p.used)}`} />
                ))}
              </div>
              <div style={{ display: 'flex', gap: 20, marginTop: 14, flexWrap: 'wrap' }}>
                {policyStats.map(p => (
                  <div key={p.id} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <div style={{ width: 10, height: 10, borderRadius: 3, background: p.color, flexShrink: 0 }} />
                    <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{p.name}</span>
                    <span style={{ fontSize: 12, fontWeight: 600 }}>{fmt(p.used)}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* 정책별 카드 */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 16 }}>
              {policyStats.map(p => {
                const pct = (p.used / p.budget) * 100;
                const monthData = MONTH_NUMS.map(m => ({
                  label: `${m}월`,
                  value: records.filter(r => r.policy === p.id && r.month === m && r.approved).reduce((s, r) => s + r.amount, 0)
                }));
                return (
                  <div key={p.id} style={{
                    background: '#fff', border: '1px solid var(--border)', borderRadius: 14,
                    padding: '20px 22px', cursor: 'pointer', transition: 'box-shadow 0.2s'
                  }}
                    onClick={() => setSelectedPolicy(p.id)}
                    onMouseEnter={e => e.currentTarget.style.boxShadow = '0 4px 20px rgba(0,0,0,0.08)'}
                    onMouseLeave={e => e.currentTarget.style.boxShadow = 'none'}
                  >
                    <div style={{ marginBottom: 16 }}>
                      <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginBottom: 4 }}>{p.name}</div>
                      <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: '-0.03em' }}>{fmt(p.used)}</div>
                      <div style={{ fontSize: 12, color: 'var(--text-tertiary)', marginTop: 2 }}>예산 {fmt(p.budget)}</div>
                    </div>
                    <ProgressBar value={p.used} max={p.budget} color={p.color} height={6} />
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 10 }}>
                      <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>소진율 {pct.toFixed(1)}%</span>
                      <span style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>잔여 {fmt(p.remaining)}</span>
                    </div>
                    <div style={{ marginTop: 16 }}>
                      <MiniBarChart data={monthData} color={p.color} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ════ 월별 현황 탭 ════ */}
        {activeTab === 'monthly' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12 }}>
              <div style={{ fontWeight: 600, fontSize: 16 }}>월별 복지 예산 사용 현황</div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {Object.values(POLICY_CONFIG).map(p => {
                  const active = chartFilter.includes(p.id);
                  return (
                    <button key={p.id} onClick={() => {
                      setChartFilter(prev =>
                        prev.includes(p.id) ? prev.filter(id => id !== p.id) : [...prev, p.id]
                      );
                    }} style={{
                      display: 'flex', alignItems: 'center', gap: 6,
                      padding: '5px 12px', borderRadius: 8, cursor: 'pointer',
                      border: `1.5px solid ${active ? p.color : 'var(--border)'}`,
                      background: active ? p.colorLight : '#fff',
                      color: active ? p.color : 'var(--text-tertiary)',
                      fontSize: 12, fontWeight: active ? 600 : 400,
                      fontFamily: 'inherit', transition: 'all 0.15s'
                    }}>
                      <div style={{ width: 8, height: 8, borderRadius: 2, background: active ? p.color : '#d0d0cc' }} />
                      {p.shortName}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* SVG 바 차트 */}
            <div style={{ background: '#fff', border: '1px solid var(--border)', borderRadius: 14, padding: '24px' }}>
              {(() => {
                const policies = Object.values(POLICY_CONFIG);
                const W = 800, H = 200, PAD_L = 60, PAD_R = 16, PAD_T = 16, PAD_B = 36;
                const chartW = W - PAD_L - PAD_R;
                const chartH = H - PAD_T - PAD_B;
                const maxVal = Math.max(...monthlyData.map(md => Math.max(...policies.map(p => md.byPolicy[p.id] || 0))), 1);
                const gridVals = [0, maxVal * 0.5, maxVal];
                const yPos = (v) => PAD_T + chartH - (v / maxVal) * chartH;
                const monthW = chartW / MONTH_NUMS.length;
                const barPad = 4;
                const groupW = monthW - barPad * 2;
                const barW = Math.max(4, groupW / policies.length - 2);

                return (
                  <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', display: 'block' }}>
                    {gridVals.map((v, i) => (
                      <g key={i}>
                        <line x1={PAD_L} y1={yPos(v)} x2={W - PAD_R} y2={yPos(v)} stroke="#e8e8e4" strokeWidth="1" />
                        {v > 0 && <text x={PAD_L - 6} y={yPos(v) + 4} textAnchor="end" fontSize="9" fill="#a0a09a">{fmtAxis(v)}</text>}
                      </g>
                    ))}

                    {monthlyData.map((md, mi) => {
                      const groupX = PAD_L + mi * monthW + barPad;
                      return policies.map((p, pi) => {
                        const v = md.byPolicy[p.id] || 0;
                        if (v === 0) return null;
                        const bx = groupX + pi * (barW + 2);
                        const bh = Math.max(2, (v / maxVal) * chartH);
                        const by = yPos(v);
                        return (
                          <g key={`${mi}-${pi}`}>
                            <rect x={bx} y={by} width={barW} height={bh}
                              fill={p.color} rx="2"
                              opacity={chartFilter.includes(p.id) ? (md.month <= cur ? 1 : 0.35) : 0.1}>
                              <title>{p.name}: {fmt(v)}</title>
                            </rect>
                            {bh > 10 && chartFilter.includes(p.id) && (
                              <text x={bx + barW / 2} y={by - 3} textAnchor="middle"
                                fontSize="8" fill={p.color} fontWeight="600">{fmtAxis(v)}</text>
                            )}
                          </g>
                        );
                      });
                    })}

                    {monthlyData.map((md, mi) => {
                      const cx = PAD_L + mi * monthW + monthW / 2;
                      return (
                        <text key={mi} x={cx} y={H - 8} textAnchor="middle" fontSize="10"
                          fill={md.month <= cur ? '#1a1a18' : '#a0a09a'}
                          fontWeight={md.month === cur ? '700' : '400'}>
                          {md.label}
                        </text>
                      );
                    })}

                    {(() => {
                      const ci = MONTH_NUMS.indexOf(cur);
                      if (ci < 0) return null;
                      const lx = PAD_L + (ci + 1) * monthW;
                      return <line x1={lx} y1={PAD_T} x2={lx} y2={PAD_T + chartH}
                        stroke="#1a1a18" strokeWidth="1" strokeDasharray="3,3" opacity="0.2" />;
                    })()}
                  </svg>
                );
              })()}
              <div style={{ display: 'flex', gap: 16, marginTop: 12, paddingTop: 16, borderTop: '1px solid var(--border)', flexWrap: 'wrap' }}>
                {Object.values(POLICY_CONFIG).map(p => (
                  <div key={p.id} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <div style={{ width: 12, height: 12, borderRadius: 3, background: p.color }} />
                    <span style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{p.shortName}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* 월별 테이블 */}
            <div style={{ background: '#fff', border: '1px solid var(--border)', borderRadius: 14, overflow: 'hidden' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                <thead>
                  <tr style={{ borderBottom: '1px solid var(--border)' }}>
                    <th style={{ padding: '12px 20px', textAlign: 'left', fontSize: 12, color: 'var(--text-secondary)', fontWeight: 500 }}>월</th>
                    {Object.values(POLICY_CONFIG).map(p => (
                      <th key={p.id} style={{ padding: '12px 16px', textAlign: 'right', fontSize: 12, color: 'var(--text-secondary)', fontWeight: 500 }}>{p.shortName}</th>
                    ))}
                    <th style={{ padding: '12px 20px', textAlign: 'right', fontSize: 12, color: 'var(--text-secondary)', fontWeight: 500 }}>합계</th>
                  </tr>
                </thead>
                <tbody>
                  {monthlyData.map((md, i) => (
                    <tr key={i} style={{ borderBottom: '1px solid var(--border)', background: md.month < cur ? 'oklch(98% 0.01 240)' : 'transparent' }}>
                      <td style={{ padding: '12px 20px', fontSize: 13, fontWeight: md.month <= cur ? 600 : 400 }}>{md.label}</td>
                      {Object.values(POLICY_CONFIG).map(p => (
                        <td key={p.id} style={{ padding: '12px 16px', textAlign: 'right', fontSize: 13, color: md.byPolicy[p.id] > 0 ? 'var(--text-primary)' : 'var(--text-tertiary)' }}>
                          {md.byPolicy[p.id] > 0 ? fmt(md.byPolicy[p.id]) : '—'}
                        </td>
                      ))}
                      <td style={{ padding: '12px 20px', textAlign: 'right', fontSize: 13, fontWeight: 600 }}>
                        {md.total > 0 ? fmt(md.total) : '—'}
                      </td>
                    </tr>
                  ))}
                  <tr style={{ background: 'var(--bg)' }}>
                    <td style={{ padding: '12px 20px', fontSize: 13, fontWeight: 700 }}>합계</td>
                    {Object.values(POLICY_CONFIG).map(p => (
                      <td key={p.id} style={{ padding: '12px 16px', textAlign: 'right', fontSize: 13, fontWeight: 600 }}>
                        {fmt(policyStats.find(ps => ps.id === p.id).used)}
                      </td>
                    ))}
                    <td style={{ padding: '12px 20px', textAlign: 'right', fontSize: 13, fontWeight: 700 }}>{fmt(totalUsed)}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ════ 신청 내역 탭 ════ */}
        {activeTab === 'records' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div style={{ fontWeight: 600, fontSize: 16 }}>신청 내역 ({filteredRecords.length}건)</div>
              <div style={{ display: 'flex', gap: 8 }}>
                {[['all', '전체'], ...Object.values(POLICY_CONFIG).map(p => [p.id, p.shortName])].map(([id, label]) => (
                  <button key={id} onClick={() => setFilterPolicy(id)} style={{
                    background: filterPolicy === id ? 'var(--text-primary)' : '#fff',
                    color: filterPolicy === id ? '#fff' : 'var(--text-secondary)',
                    border: '1px solid var(--border)', cursor: 'pointer',
                    padding: '6px 12px', borderRadius: 8, fontSize: 12, fontWeight: 500,
                    transition: 'all 0.15s'
                  }}>{label}</button>
                ))}
              </div>
            </div>

            <div style={{ background: '#fff', border: '1px solid var(--border)', borderRadius: 14, overflow: 'hidden' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                <thead>
                  <tr style={{ borderBottom: '1px solid var(--border)' }}>
                    {['날짜', '구분', '대상자', '금액', '비고', '상태', ''].map((h, i) => (
                      <th key={i} style={{
                        padding: '12px 16px', textAlign: i >= 3 ? 'right' : 'left',
                        fontSize: 12, color: 'var(--text-secondary)', fontWeight: 500
                      }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filteredRecords.length === 0 && (
                    <tr><td colSpan={7} style={{ padding: '40px', textAlign: 'center', color: 'var(--text-tertiary)', fontSize: 13 }}>내역이 없습니다</td></tr>
                  )}
                  {[...filteredRecords].sort((a, b) => b.date.localeCompare(a.date)).map(r => {
                    const p = POLICY_CONFIG[r.policy];
                    return (
                      <tr key={r.id} style={{ borderBottom: '1px solid var(--border)' }}>
                        <td style={{ padding: '12px 16px', fontSize: 13, color: 'var(--text-secondary)' }}>{r.date}</td>
                        <td style={{ padding: '12px 16px', fontSize: 13 }}>
                          <span style={{
                            display: 'inline-flex', alignItems: 'center',
                            padding: '2px 8px', borderRadius: 6,
                            background: p.colorLight, color: p.color,
                            fontSize: 11, fontWeight: 600
                          }}>{p.shortName}</span>
                        </td>
                        <td style={{ padding: '12px 16px', fontSize: 13, fontWeight: 500 }}>{r.name}</td>
                        <td style={{ padding: '12px 16px', fontSize: 13, fontWeight: 600, textAlign: 'right' }}>{fmt(r.amount)}</td>
                        <td style={{ padding: '12px 16px', fontSize: 12, color: 'var(--text-secondary)', textAlign: 'right' }}>{r.note || '—'}</td>
                        <td style={{ padding: '12px 16px', textAlign: 'right' }}>
                          <span style={{
                            display: 'inline-block', padding: '2px 8px', borderRadius: 6,
                            background: r.approved ? 'oklch(96% 0.04 160)' : 'oklch(96% 0.04 70)',
                            color: r.approved ? 'var(--accent-green)' : 'var(--accent-amber)',
                            fontSize: 11, fontWeight: 600
                          }}>{r.approved ? '승인완료' : '대기중'}</span>
                        </td>
                        <td style={{ padding: '12px 16px', textAlign: 'right' }}>
                          <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
                            <button onClick={() => setEditRecord({ ...r, amount: String(r.amount) })} style={{
                              background: 'none', border: '1px solid var(--border)', cursor: 'pointer',
                              color: 'var(--text-secondary)', fontSize: 11, borderRadius: 6,
                              padding: '3px 8px', fontFamily: 'inherit'
                            }}>수정</button>
                            <button onClick={() => handleDelete(r.id)} style={{
                              background: 'none', border: 'none', cursor: 'pointer',
                              color: 'var(--text-tertiary)', fontSize: 16, lineHeight: 1
                            }} title="삭제">×</button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ════ 대상자 현황 탭 ════ */}
        {activeTab === 'recipients' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
            <div style={{ fontWeight: 600, fontSize: 16 }}>대상자 현황</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 16 }}>
              {Object.values(POLICY_CONFIG).map(p => {
                const usedNames = records.filter(r => r.policy === p.id && r.approved).map(r => r.name);
                return (
                  <div key={p.id} style={{ background: '#fff', border: '1px solid var(--border)', borderRadius: 14, overflow: 'hidden' }}>
                    <div style={{
                      padding: '16px 20px', borderBottom: '1px solid var(--border)',
                      background: p.colorLight
                    }}>
                      <div style={{ fontWeight: 600, fontSize: 14 }}>{p.name}</div>
                      <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 1 }}>
                        {p.recipients.length}명 대상 · 1인 예산 {fmt(Math.floor(p.budget / p.recipients.length))}
                      </div>
                    </div>
                    <div>
                      {p.recipients.map((rec, i) => {
                        const isUsed = usedNames.includes(rec.name);
                        const recUsed = records
                          .filter(r => r.policy === p.id && r.name === rec.name && r.approved)
                          .reduce((s, r) => s + r.amount, 0);
                        return (
                          <div key={i} style={{
                            padding: '11px 20px',
                            borderBottom: i < p.recipients.length - 1 ? '1px solid var(--border)' : 'none',
                            display: 'flex', alignItems: 'center', justifyContent: 'space-between'
                          }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                              <div style={{
                                width: 8, height: 8, borderRadius: '50%',
                                background: isUsed ? p.color : '#e8e8e4', flexShrink: 0
                              }} />
                              <div style={{ fontSize: 13, fontWeight: 500 }}>{rec.name}</div>
                            </div>
                            <div style={{ textAlign: 'right' }}>
                              {isUsed
                                ? <span style={{ fontSize: 12, color: p.color, fontWeight: 600 }}>{fmt(recUsed)} 사용</span>
                                : <span style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>
                                    {rec.expectedMonth ? `${rec.expectedMonth}월 도래 예정` : '미사용'}
                                  </span>
                              }
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </main>

      {/* ════ 정책 상세 모달 ════ */}
      {selectedPolicy && (() => {
        const p = policyStats.find(ps => ps.id === selectedPolicy);
        const pRecords = records.filter(r => r.policy === selectedPolicy);
        return (
          <Modal title={p.name} onClose={() => setSelectedPolicy(null)}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
                {[
                  { label: '배정 예산', value: fmt(p.budget) },
                  { label: '집행 완료', value: fmt(p.used) },
                  { label: '잔여',     value: fmt(p.remaining) },
                ].map((kpi, i) => (
                  <div key={i} style={{ background: 'var(--bg)', borderRadius: 10, padding: '14px 16px' }}>
                    <div style={{ fontSize: 11, color: 'var(--text-secondary)', marginBottom: 4 }}>{kpi.label}</div>
                    <div style={{ fontSize: 16, fontWeight: 700 }}>{kpi.value}</div>
                  </div>
                ))}
              </div>
              <ProgressBar value={p.used} max={p.budget} color={p.color} height={8} />
              <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-secondary)' }}>사용 내역</div>
              {pRecords.length === 0
                ? <div style={{ fontSize: 13, color: 'var(--text-tertiary)' }}>내역 없음</div>
                : pRecords.map(r => (
                    <div key={r.id} style={{
                      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                      padding: '10px 0', borderBottom: '1px solid var(--border)'
                    }}>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 500 }}>{r.name}</div>
                        <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginTop: 2 }}>{r.date} · {r.note}</div>
                      </div>
                      <div style={{ fontWeight: 600, fontSize: 14 }}>{fmt(r.amount)}</div>
                    </div>
                  ))
              }
            </div>
          </Modal>
        );
      })()}

      {/* ════ 수정 모달 ════ */}
      {editRecord && (
        <Modal title="사용 내역 수정" onClose={() => setEditRecord(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <FormField label="제도 구분">
              <select value={editRecord.policy}
                onChange={e => setEditRecord(r => ({ ...r, policy: e.target.value }))}
                style={inputStyle}>
                {Object.values(POLICY_CONFIG).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </FormField>
            <FormField label="대상자 이름">
              <input type="text" value={editRecord.name} placeholder="이름 입력"
                onChange={e => setEditRecord(r => ({ ...r, name: e.target.value }))}
                style={inputStyle} />
            </FormField>
            <FormField label="사용 금액 (원)">
              <input type="text" value={editRecord.amount} placeholder="예: 1000000"
                onChange={e => setEditRecord(r => ({ ...r, amount: e.target.value }))}
                style={inputStyle} />
            </FormField>
            <FormField label="사용 월">
              <select value={editRecord.month}
                onChange={e => setEditRecord(r => ({ ...r, month: e.target.value }))}
                style={inputStyle}>
                {MONTH_NUMS.map(m => <option key={m} value={m}>{m}월</option>)}
              </select>
            </FormField>
            <FormField label="날짜">
              <input type="date" value={editRecord.date}
                onChange={e => setEditRecord(r => ({ ...r, date: e.target.value }))}
                style={inputStyle} />
            </FormField>
            <FormField label="비고">
              <input type="text" value={editRecord.note} placeholder="내용 입력 (선택)"
                onChange={e => setEditRecord(r => ({ ...r, note: e.target.value }))}
                style={inputStyle} />
            </FormField>
            <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
              <button onClick={() => setEditRecord(null)} style={{
                flex: 1, background: 'var(--bg)', color: 'var(--text-secondary)',
                border: '1px solid var(--border)', cursor: 'pointer', borderRadius: 10,
                padding: '12px', fontSize: 14, fontWeight: 500, fontFamily: 'inherit'
              }}>취소</button>
              <button onClick={handleSaveEdit} disabled={saving} style={{
                flex: 2, background: 'var(--text-primary)', color: '#fff',
                border: 'none', cursor: saving ? 'default' : 'pointer', borderRadius: 10,
                padding: '12px', fontSize: 14, fontWeight: 600, fontFamily: 'inherit',
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
                opacity: saving ? 0.7 : 1
              }}>
                {saving && <Spinner size={14} color="#fff" />}
                저장
              </button>
            </div>
          </div>
        </Modal>
      )}

      {/* ════ 추가 모달 ════ */}
      {showAddModal && (
        <Modal title="사용 내역 추가" onClose={() => setShowAddModal(false)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <FormField label="제도 구분">
              <select value={newRecord.policy}
                onChange={e => setNewRecord(r => ({ ...r, policy: e.target.value }))}
                style={inputStyle}>
                {Object.values(POLICY_CONFIG).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </FormField>
            <FormField label="대상자 이름">
              <input type="text" value={newRecord.name} placeholder="이름 입력"
                onChange={e => setNewRecord(r => ({ ...r, name: e.target.value }))}
                style={inputStyle} />
            </FormField>
            <FormField label="사용 금액 (원)">
              <input type="text" value={newRecord.amount} placeholder="예: 1000000"
                onChange={e => setNewRecord(r => ({ ...r, amount: e.target.value }))}
                style={inputStyle} />
            </FormField>
            <FormField label="사용 월">
              <select value={newRecord.month}
                onChange={e => setNewRecord(r => ({ ...r, month: e.target.value }))}
                style={inputStyle}>
                {MONTH_NUMS.map(m => <option key={m} value={m}>{m}월</option>)}
              </select>
            </FormField>
            <FormField label="날짜">
              <input type="date" value={newRecord.date}
                onChange={e => setNewRecord(r => ({ ...r, date: e.target.value }))}
                style={inputStyle} />
            </FormField>
            <FormField label="비고">
              <input type="text" value={newRecord.note} placeholder="내용 입력 (선택)"
                onChange={e => setNewRecord(r => ({ ...r, note: e.target.value }))}
                style={inputStyle} />
            </FormField>
            <button onClick={handleAddRecord} disabled={saving} style={{
              background: 'var(--text-primary)', color: '#fff', border: 'none',
              cursor: saving ? 'default' : 'pointer', borderRadius: 10,
              padding: '12px', fontSize: 14, fontWeight: 600, marginTop: 4,
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
              opacity: saving ? 0.7 : 1
            }}>
              {saving && <Spinner size={14} color="#fff" />}
              추가 저장
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ─── 루트 ────────────────────────────────────────────────────────────────────

const Root = () => {
  const [authed, setAuthed] = React.useState(() => sessionStorage.getItem('adro_auth') === '1');
  if (!authed) return <LoginScreen onSuccess={() => setAuthed(true)} />;
  return <App />;
};

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
